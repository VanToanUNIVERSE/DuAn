<html>
<body>
<script>
let currentCourses = [];
let subject = {
    id: 304, name: 'LTCB', credits: 2,
    corequisites_info: [
        {id: 305, name: 'LTCB-TH', credits: 2},
        {id: 305, name: 'LTCB-TH', credits: 2}
    ]
};

function addToCurrentCourses(subject) {
    if(currentCourses.find(c=>c.id==subject.id))return;
    currentCourses.push({id:subject.id,name:subject.name,credits:subject.credits,semesterName:'?',grade:null});
    
    if (subject.corequisites_info && subject.corequisites_info.length > 0) {
        let autoAdded = [];
        subject.corequisites_info.forEach(coreq => {
            if(!currentCourses.find(c=>c.id==coreq.id)) {
                currentCourses.push({id:coreq.id,name:coreq.name,credits:coreq.credits,semesterName:'?',grade:null});
                autoAdded.push(coreq.name);
            }
        });
        if (autoAdded.length > 0) {
            console.log(`Đã tự động thêm môn song hành: ${autoAdded.join(', ')}`);
        }
    }
}
addToCurrentCourses(subject);
console.log(currentCourses);
</script>
</body>
</html>
